# Configuracion comercial editable para el export Tienda Nube.
# Las credenciales se mantienen en `.env`.

[pricing]
# Si es `true`, usa la cotizacion del dolar que devuelve la API.
use_api_usd_exchange = true
# Si es `true`, usa el dolar manual de abajo en vez del de la API.
use_usd_override = true
# Valor manual del dolar cuando `use_usd_override = true`.
usd_exchange_override = 1450.0
# Porcentaje extra sobre el precio base que llega desde GN. Ejemplo: `60.0` suma 60%.
margin_pct = 60.0
# Monto fijo en pesos que se suma al precio antes del redondeo.
fixed_markup_ars = 0.0
# Escalon de redondeo final. `1000` redondea al millar mas cercano.
rounding_step = 1000.0
# Forma de redondeo: `nearest` al mas cercano, `up` siempre hacia arriba, `down` siempre hacia abajo.
rounding_mode = "nearest"
# Valor que se exporta en la columna `Costo`: `ars_neto`, `usd_origen` o `ars_final`.
cost_field_mode = "ars_neto"

[publication]
# Si es `true`, solo publica productos con el stock minimo definido abajo.
publish_with_stock_only = true
# Stock minimo necesario para exportar `Mostrar en tienda = SI`.
min_stock_to_publish = 1
# Completa la columna `Envío sin cargo` con `SI` o `NO`.
free_shipping = false
# Completa la columna `Producto Físico` con `SI` o `NO`.
product_physical = true
# Si la lista tiene valores, solo sube productos cuya categoria final este incluida.
allowed_categories = [
  "Tecnología",
  "Computación",
  "Celulares",
  "Gaming",
  "Audio y TV",
  "Seguridad",
  "Movilidad",
]
# Categorias finales que nunca se suben, aunque existan en GN.
excluded_categories = [
  "Hogar",
  "Electro",
  "Herramientas",
  "Automotor",
  "Varios",
]

[content]
# Marca de respaldo si el producto viene sin marca o con una marca vacia.
default_brand_when_empty = ""
# Largo maximo del campo `Título para SEO`.
seo_title_max_length = 70
# Largo maximo del campo `Descripción para SEO`.
seo_description_max_length = 160
# Texto que se agrega al inicio de la descripcion.
description_prefix = ""
# Texto que se agrega al final de la descripcion.
description_suffix = ""

[mappings]
# Archivo para reemplazar marcas: `source_brand,target_brand`.
brand_map_csv = "brand_map.csv"
# Archivo para remapear categorias: `source_category,source_subcategory,target_category,target_subcategory`.
category_map_csv = "category_map.csv"

[diff]
# Diferencia minima en ARS para considerar que un precio cambio entre snapshots.
price_tolerance_ars = 0.5

[output]
# Carpeta donde se guardan los CSV, Excel y comparaciones.
output_dir = "exports"
# Si es `true`, genera el CSV para Tienda Nube.
include_csv = true
# Si es `true`, genera tambien la version Excel.
include_xlsx = true
# Cantidad de productos a usar en el flujo de prueba. `0` usa todos.
test_product_limit = 1

[tiendanube_sync]
# Si es `true`, habilita el sync completo por API contra Tienda Nube.
enabled = true
# Si es `true`, el sync calcula acciones pero no escribe en la tienda.
dry_run = true
# Tag tecnico para identificar productos administrados por esta app.
managed_tag = "GN_SYNC"
# Prefijo del handle estable. Ejemplo: `gn-3389`.
handle_prefix = "gn"
# Si es `true`, despublica y deja stock 0 a productos GN faltantes.
unpublish_missing = true
# Politica de imagenes. Por ahora solo soporta `append_only`.
image_mode = "append_only"
# Cantidad maxima de productos a revisar en el dry-run de Tienda Nube. `0` usa todos.
test_product_limit = 20
